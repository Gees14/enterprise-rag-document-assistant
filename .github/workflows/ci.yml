name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  backend-tests:
    name: Backend Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create data directories
        run: mkdir -p data/uploads data/vector_store data/eval

      - name: Copy evaluation questions
        run: cp data/eval/questions.json data/eval/questions.json || true

      - name: Run pytest
        env:
          OPENAI_API_KEY: ""
          EMBEDDING_MODEL: all-MiniLM-L6-v2
        run: pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        env:
          VITE_API_URL: http://localhost:8000
        run: npm run build

  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Python syntax
        working-directory: backend
        run: |
          python -m py_compile app/main.py
          python -m py_compile app/core/config.py
          python -m py_compile app/core/errors.py
          python -m py_compile app/services/chunker.py
          python -m py_compile app/services/document_loader.py
          python -m py_compile app/services/generator.py
          python -m py_compile app/services/evaluator.py
